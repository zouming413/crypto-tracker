<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Crypto</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="overview-page">
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-logo" id="overviewNavLogo">Simple Crypto</div>
            <div class="nav-actions">
                <div class="sync-button overview-status-pill" id="overviewStatus" aria-live="polite">
                    <span class="sync-dot"></span>
                    <span id="overviewStatusText">云端读取中</span>
                </div>
                <a class="nav-link-button nav-link-button-primary" id="configEntryLink" href="config.html">配置</a>
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="zh" type="button" onclick="switchOverviewLanguage('zh')">中文</button>
                    <button class="lang-btn" data-lang="en" type="button" onclick="switchOverviewLanguage('en')">EN</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main overview-main">
        <section class="container overview-shell">
            <div class="overview-layout">
                <section class="overview-panel">
                    <div class="overview-panel-head">
                        <h2 class="overview-panel-title" id="fixedIncomePanelTitle">固定收益</h2>
                        <div class="overview-panel-badge" id="fixedIncomeBadge">0</div>
                    </div>
                    <div class="overview-panel-body overview-fixed-body" id="overviewFixedIncome"></div>
                </section>

                <section class="overview-panel">
                    <div class="overview-panel-head">
                        <h2 class="overview-panel-title" id="strategyPanelTitle">长线策略</h2>
                        <div class="overview-panel-badge" id="strategyBadge">0</div>
                    </div>
                    <div class="overview-panel-body overview-strategy-body" id="overviewStrategies"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
